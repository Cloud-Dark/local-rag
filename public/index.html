<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 700px; margin: 0 auto; padding: 20px; background: #fafafa; }
    
    /* Tabs */
    .tabs { display: flex; border-bottom: 1px solid #ddd; margin-bottom: 20px; }
    .tab { padding: 10px 20px; cursor: pointer; border: none; background: none; font-size: 0.9rem; color: #666; border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .tab:hover { color: #333; }
    .tab.active { color: #333; border-bottom-color: #333; font-weight: 500; }
    
    /* Tab Content */
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    /* Cards */
    .card { background: white; border: 1px solid #eee; border-radius: 6px; padding: 20px; margin-bottom: 15px; }
    .card h3 { font-size: 0.85rem; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 15px; font-weight: 500; }
    
    /* Forms */
    label { display: block; font-size: 0.8rem; color: #666; margin-bottom: 6px; }
    textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9rem; font-family: inherit; resize: vertical; min-height: 120px; }
    input[type="text"], input[type="url"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9rem; }
    
    /* Buttons */
    button { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-weight: 500; }
    button:hover { background: #555; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary { background: #f5f5f5; color: #333; }
    button.secondary:hover { background: #eee; }
    button.danger { background: #fee2e2; color: #dc2626; }
    button.danger:hover { background: #fecaca; }
    
    /* File Input */
    input[type="file"] { margin-top: 8px; }
    
    /* Items List */
    .items { margin-top: 12px; }
    .item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: #f9f9f9; border-radius: 4px; margin-bottom: 8px; font-size: 0.85rem; }
    .item button { padding: 4px 10px; font-size: 0.75rem; background: transparent; color: #999; }
    .item button:hover { background: #eee; color: #333; }
    
    /* Status */
    .status { margin-top: 12px; font-size: 0.8rem; padding: 10px; border-radius: 4px; }
    .status.success { background: #d1fae5; color: #065f46; }
    .status.error { background: #fee2e2; color: #991b1b; }
    .status.loading { background: #e0e7ff; color: #3730a3; }
    
    /* Search Results */
    .result { padding: 15px 0; border-bottom: 1px solid #eee; }
    .result:last-child { border-bottom: none; }
    .score { font-size: 0.75rem; color: #999; margin-bottom: 6px; }
    .text { font-size: 0.9rem; color: #333; margin-bottom: 8px; line-height: 1.6; }
    .meta { font-size: 0.75rem; color: #999; }
    .meta a { color: #333; }
    
    /* Document List */
    .doc-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #f9f9f9; border-radius: 4px; margin-bottom: 8px; }
    .doc-info { flex: 1; }
    .doc-name { font-size: 0.9rem; color: #333; }
    .doc-meta { font-size: 0.75rem; color: #999; margin-top: 4px; }
    .doc-actions button { margin-left: 6px; padding: 4px 8px; font-size: 0.75rem; }
    
    /* Empty State */
    .empty { text-align: center; padding: 40px 20px; color: #999; }
    .empty-icon { font-size: 2rem; margin-bottom: 10px; }
  </style>
</head>
<body>
  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('training')">Training</button>
    <button class="tab" onclick="switchTab('list')">List</button>
    <button class="tab" onclick="switchTab('search')">Search</button>
  </div>

  <!-- Training Tab -->
  <div id="training" class="tab-content active">
    
    <!-- Text Input -->
    <div class="card">
      <h3>1. Text Input</h3>
      <textarea id="textInput" placeholder="Paste your text here..."></textarea>
      <input type="url" id="textSourceUrl" placeholder="Source URL (optional)" style="margin-top: 12px;">
      <button onclick="trainText()" style="margin-top: 12px;" id="trainTextBtn">Train Text</button>
      <div id="textStatus"></div>
    </div>

    <!-- File Upload -->
    <div class="card">
      <h3>2. File Upload</h3>
      <input type="file" id="fileInput" multiple accept=".pdf,.txt,.md">
      <div class="items" id="fileList"></div>
      <button onclick="trainFiles()" style="margin-top: 12px;" id="trainFileBtn">Train Files</button>
      <div id="fileStatus"></div>
    </div>

    <!-- URL Input -->
    <div class="card">
      <h3>3. URL Fetch</h3>
      <div style="display: flex; gap: 8px;">
        <input type="url" id="urlInput" placeholder="https://example.com/article" onkeypress="if(event.key==='Enter')addUrl()">
        <button class="secondary" onclick="addUrl()">Add</button>
      </div>
      <div class="items" id="urlList"></div>
      <button onclick="trainUrls()" style="margin-top: 12px;" id="trainUrlBtn">Train URLs</button>
      <div id="urlStatus"></div>
    </div>

  </div>

  <!-- List Tab -->
  <div id="list" class="tab-content">
    <div class="card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h3 style="margin: 0;">Documents</h3>
        <button class="secondary" onclick="loadDocuments()">Refresh</button>
      </div>
      <div id="docList"></div>
      <div id="docEmpty" class="empty">
        <div class="empty-icon">📄</div>
        <div>No documents trained yet</div>
      </div>
    </div>
  </div>

  <!-- Search Tab -->
  <div id="search" class="tab-content">
    <div class="card">
      <h3>Search</h3>
      <div style="display: flex; gap: 8px;">
        <input type="text" id="searchInput" placeholder="Ask a question..." onkeypress="if(event.key==='Enter')search()">
        <button onclick="search()">Search</button>
      </div>
      <div id="results" style="margin-top: 20px;"></div>
    </div>
  </div>

  <script>
    const API = window.location.origin + '/api';
    let files = [];
    let urls = [];

    // Tab Switching
    function switchTab(tabId) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab[onclick="switchTab('${tabId}')"]`).classList.add('active');
      document.getElementById(tabId).classList.add('active');
      
      if (tabId === 'list') loadDocuments();
    }

    // File handling
    document.getElementById('fileInput').addEventListener('change', (e) => {
      files = [...e.target.files];
      renderFiles();
    });

    function renderFiles() {
      const list = document.getElementById('fileList');
      list.innerHTML = files.map((f, i) => `
        <div class="item">
          <span>${f.name}</span>
          <button onclick="removeFile(${i})">✕</button>
        </div>
      `).join('');
    }

    function removeFile(i) {
      files.splice(i, 1);
      renderFiles();
      document.getElementById('fileInput').value = '';
    }

    // URL handling
    function addUrl() {
      const input = document.getElementById('urlInput');
      const url = input.value.trim();
      if (url && isValidUrl(url)) {
        urls.push(url);
        renderUrls();
        input.value = '';
      }
    }

    function renderUrls() {
      const list = document.getElementById('urlList');
      list.innerHTML = urls.map((u, i) => `
        <div class="item">
          <span>${u}</span>
          <button onclick="removeUrl(${i})">✕</button>
        </div>
      `).join('');
    }

    function removeUrl(i) {
      urls.splice(i, 1);
      renderUrls();
    }

    function isValidUrl(s) {
      try { new URL(s); return true; } catch { return false; }
    }

    // Training Functions
    async function trainText() {
      const text = document.getElementById('textInput').value.trim();
      const sourceUrl = document.getElementById('textSourceUrl').value.trim();
      const btn = document.getElementById('trainTextBtn');
      const status = document.getElementById('textStatus');

      if (!text) {
        showStatus(status, 'Enter some text', 'error');
        return;
      }

      btn.disabled = true;
      showStatus(status, 'Training...', 'loading');

      const formData = new FormData();
      formData.append('text', text);
      if (sourceUrl) {
        formData.append('sourceUrls', sourceUrl);
      }

      try {
        const res = await fetch(`${API}/training`, { method: 'POST', body: formData });
        const result = await res.json();
        
        if (result.success) {
          showStatus(status, `Done! ${result.processed.length} items, ${result.totalChunksInDB} chunks in DB`, 'success');
          document.getElementById('textInput').value = '';
          document.getElementById('textSourceUrl').value = '';
        } else {
          showStatus(status, result.error || 'Failed', 'error');
        }
      } catch (e) {
        showStatus(status, e.message, 'error');
      }

      btn.disabled = false;
    }

    async function trainFiles() {
      const btn = document.getElementById('trainFileBtn');
      const status = document.getElementById('fileStatus');

      if (!files.length) {
        showStatus(status, 'Select files first', 'error');
        return;
      }

      btn.disabled = true;
      showStatus(status, 'Training...', 'loading');

      const formData = new FormData();
      files.forEach(f => formData.append('files', f));

      try {
        const res = await fetch(`${API}/training`, { method: 'POST', body: formData });
        const result = await res.json();
        
        if (result.success) {
          showStatus(status, `Done! ${result.processed.length} items, ${result.totalChunksInDB} chunks in DB`, 'success');
          files = [];
          renderFiles();
          document.getElementById('fileInput').value = '';
        } else {
          showStatus(status, result.error || 'Failed', 'error');
        }
      } catch (e) {
        showStatus(status, e.message, 'error');
      }

      btn.disabled = false;
    }

    async function trainUrls() {
      const btn = document.getElementById('trainUrlBtn');
      const status = document.getElementById('urlStatus');

      if (!urls.length) {
        showStatus(status, 'Add URLs first', 'error');
        return;
      }

      btn.disabled = true;
      showStatus(status, 'Training...', 'loading');

      const formData = new FormData();
      formData.append('urls', JSON.stringify(urls));

      try {
        const res = await fetch(`${API}/training`, { method: 'POST', body: formData });
        const result = await res.json();
        
        if (result.success) {
          showStatus(status, `Done! ${result.processed.length} items, ${result.totalChunksInDB} chunks in DB`, 'success');
          urls = [];
          renderUrls();
        } else {
          showStatus(status, result.error || 'Failed', 'error');
        }
      } catch (e) {
        showStatus(status, e.message, 'error');
      }

      btn.disabled = false;
    }

    function showStatus(el, msg, type) {
      el.className = `status ${type}`;
      el.textContent = msg;
    }

    // Load Documents
    async function loadDocuments() {
      const list = document.getElementById('docList');
      const empty = document.getElementById('docEmpty');

      try {
        const res = await fetch(`${API}/get-list`);
        const data = await res.json();

        if (data.documents && data.documents.length) {
          empty.style.display = 'none';
          list.innerHTML = `
            <div style="margin-bottom: 12px; font-size: 0.8rem; color: #999;">
              Total: ${data.totalChunks} chunks from ${data.documents.length} documents
            </div>
            ${data.documents.map(doc => `
              <div class="doc-item">
                <div class="doc-info">
                  <div class="doc-name">
                    ${doc.isUrl ? '🌐 ' : '📄 '}
                    ${escapeHtml(doc.fileName)}
                    ${doc.sourceUrl ? `<a href="${doc.sourceUrl}" target="_blank" style="margin-left: 6px; font-size: 0.75rem; color: #666;">↗</a>` : ''}
                  </div>
                  <div class="doc-meta">${doc.chunks} chunks • ${doc.isUrl ? 'URL' : (doc.fileExists ? 'File exists' : 'File missing')}</div>
                </div>
                <div class="doc-actions">
                  <button class="danger" onclick="deleteDoc('${escapeHtml(doc.fileName)}')">Delete</button>
                </div>
              </div>
            `).join('')}
          `;
        } else {
          empty.style.display = 'block';
          list.innerHTML = '';
        }
      } catch (e) {
        list.innerHTML = `<div style="color: #ef4444; padding: 20px;">Error: ${e.message}</div>`;
      }
    }

    // Delete Document
    async function deleteDoc(fileName) {
      if (!confirm(`Delete "${fileName}"?`)) return;

      try {
        const res = await fetch(`${API}/reset?filesOnly=true&fileName=${encodeURIComponent(fileName)}`, { method: 'DELETE' });
        const result = await res.json();
        
        if (result.success) {
          loadDocuments();
        } else {
          alert(result.message || 'Failed to delete');
        }
      } catch (e) {
        alert('Error: ' + e.message);
      }
    }

    // Search
    async function search() {
      const query = document.getElementById('searchInput').value.trim();
      const results = document.getElementById('results');
      
      if (!query) return;

      results.innerHTML = '<div style="color: #999; padding: 20px 0;">Searching...</div>';

      try {
        const res = await fetch(`${API}/search`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query, topK: 5 })
        });
        const data = await res.json();

        if (data.results && data.results.length) {
          results.innerHTML = `
            <div style="font-size: 0.8rem; color: #999; margin-bottom: 15px;">
              Found ${data.results.length} results for "${escapeHtml(data.query)}"
            </div>
            ${data.results.map(r => `
              <div class="result">
                <div class="score">${(r.score * 100).toFixed(0)}% • ${escapeHtml(r.fileName)}</div>
                <div class="text">${escapeHtml(r.text)}</div>
                ${r.sourceUrl ? `<div class="meta"><a href="${r.sourceUrl}" target="_blank">Source: ${r.sourceUrl}</a></div>` : ''}
              </div>
            `).join('')}
          `;
        } else {
          results.innerHTML = '<div style="color: #999; padding: 20px 0;">No results found</div>';
        }
      } catch (e) {
        results.innerHTML = `<div style="color: #ef4444; padding: 20px 0;">Error: ${e.message}</div>`;
      }
    }

    function escapeHtml(t) {
      const d = document.createElement('div');
      d.textContent = t;
      return d.innerHTML;
    }
  </script>
</body>
</html>
